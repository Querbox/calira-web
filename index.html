<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14110f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,30;0,9..144,400..700,100;1,9..144,400..700,100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Outfit:wght@400..700&family=Public+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        const raw = localStorage.getItem('calira:data:v1');
        const d = raw ? JSON.parse(raw) : {};
        const root = document.documentElement;
        if (d.theme) root.setAttribute('data-theme', d.theme);
        if (d.fontMode) root.setAttribute('data-font', d.fontMode);
      } catch (_) {}
    </script>
    <title>Calira — ein leises Tagebuch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
